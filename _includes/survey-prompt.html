{% unless page.url == '/survey/' %}
<div
  id="survey-prompt"
  class="survey-prompt"
  data-auto-open="{% if page.survey_popup %}true{% else %}false{% endif %}"
>
  <button
    class="survey-prompt-launcher"
    type="button"
    aria-label="Open reader survey invitation"
    aria-haspopup="dialog"
    aria-controls="survey-prompt-modal"
  >
    <span class="survey-prompt-launcher-icon" aria-hidden="true">✓</span>
    <span>Reader Survey</span>
  </button>

  <div class="survey-prompt-modal" id="survey-prompt-modal" hidden>
    <div class="survey-prompt-backdrop" data-survey-prompt-close></div>
    <section
      class="survey-prompt-card"
      role="dialog"
      aria-modal="true"
      aria-labelledby="survey-prompt-title"
      aria-describedby="survey-prompt-description"
    >
      <button
        class="survey-prompt-close"
        type="button"
        aria-label="Close reader survey invitation"
        data-survey-prompt-close
      >&times;</button>
      <span class="survey-step-kicker">Help shape what comes next</span>
      <h2 id="survey-prompt-title">Should this site continue after the World Cup?</h2>
      <p id="survey-prompt-description">
        Tell me what you would actually read—from Premier League reviews and
        Americans Abroad to Orioles or Ravens coverage.
      </p>
      <a class="survey-button survey-button--primary" href="{{ '/survey/' | relative_url }}">
        Take the 2-minute survey <span aria-hidden="true">&rarr;</span>
      </a>
      <button class="survey-prompt-later" type="button" data-survey-prompt-close>Maybe later</button>
    </section>
  </div>
</div>
<script src="{{ '/assets/js/survey-prompt.js' | relative_url }}" defer></script>
{% endunless %}

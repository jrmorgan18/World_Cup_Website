{% if site.chat_worker_url %}
<div id="wcg-chat" data-worker-url="{{ site.chat_worker_url }}">
  <button class="wcg-chat-launcher" type="button" aria-label="Open chat" aria-expanded="false">
    <span class="wcg-chat-launcher-icon" aria-hidden="true">💬</span>
    <span class="wcg-chat-launcher-text">Ask the Guide</span>
  </button>
  <section class="wcg-chat-panel" role="dialog" aria-label="World Cup Guide chat" hidden>
    <header class="wcg-chat-header">
      <div>
        <div class="wcg-chat-title">Ask the Guide</div>
        <div class="wcg-chat-subtitle">Grounded in everything on this site</div>
      </div>
      <button class="wcg-chat-close" type="button" aria-label="Close chat">×</button>
    </header>
    <div class="wcg-chat-messages" aria-live="polite"></div>
    <form class="wcg-chat-form">
      <textarea class="wcg-chat-input" rows="1" placeholder="Ask about a team, player, group, or article…" maxlength="2000" required></textarea>
      <button class="wcg-chat-send" type="submit" aria-label="Send message">→</button>
    </form>
    <footer class="wcg-chat-footer">
      Replies are AI-generated from this site only. Don't take stats as gospel.
    </footer>
  </section>
</div>
<script src="{{ '/assets/js/chat.js' | relative_url }}" defer></script>
{% endif %}

name: Update group-stage scores

# Pulls live group-stage results into _data/schedule.json so the standings
# tables update automatically. Requires a repo secret FOOTBALL_DATA_API_KEY
# (free key from https://www.football-data.org/). Without it the job is a
# harmless no-op. You can also edit scores by hand in _data/schedule.json.

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes (UTC)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Update scores
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/update_scores.py
      - name: Commit changes
        run: |
          if [[ -n "$(git status --porcelain _data/schedule.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add _data/schedule.json
            git commit -m "Auto-update group-stage scores"
            git push
          else
            echo "No changes to commit."
          fi

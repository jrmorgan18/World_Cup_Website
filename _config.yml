title: "The World Cup Guide"
description: "Your essential guide to the 2026 FIFA World Cup — team profiles, player spotlights, analysis, and betting insights"
url: "https://jrmorgan18.github.io"
baseurl: "/World_Cup_Website"
permalink: /:categories/:title/

# Chat widget — set this to the Cloudflare Worker URL after deploying worker/.
# Leave blank or remove to hide the widget.
chat_worker_url: "https://world-cup-chat.jrmorgan16.workers.dev"

collections_dir: ""
markdown: kramdown
highlighter: rouge
future: true

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
